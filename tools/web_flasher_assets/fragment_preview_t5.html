
            <div class="space-y-3 rounded-md border bg-muted/30 p-4">
              <p class="text-xs font-medium uppercase tracking-wide text-muted-foreground">Live preview</p>
              <p class="text-xs text-muted-foreground">The real LVGL e-paper UI running in your browser (WebAssembly) on mock data — tap and scroll it like the touchscreen before you flash.</p>
              <div id="simt5" class="flex flex-col items-center gap-3">
                <style>
                  #simt5 canvas { width: 240px; height: auto; background:#fff;
                    border:1px solid hsl(var(--border)); border-radius:6px; cursor:pointer; touch-action:none; }
                  #simt5 .ctl { display:inline-flex; align-items:center; justify-content:center; white-space:nowrap;
                    border:1px solid hsl(var(--border)); border-radius:6px; padding:5px 10px; font-size:12px; font-weight:500;
                    background:hsl(var(--background)); color:hsl(var(--foreground)); cursor:pointer; }
                  #simt5 .ctl:hover { background:hsl(var(--muted)); }
                </style>
                <div class="flex flex-wrap items-center justify-center gap-2">
                  <select id="simt5-goto" class="ctl"></select>
                  <select id="simt5-lang" class="ctl"><option value="0">EN</option><option value="1">SL</option></select>
                  <button id="simt5-reset" class="ctl" type="button">Reset</button>
                </div>
                <canvas id="simt5-screen" width="540" height="960"></canvas>
                <p id="simt5-status" class="text-xs text-muted-foreground">Loading preview…</p>
              </div>
            </div>
<script src="sim_t5.js"></script>
<script>
(function () {
  // Screens that render standalone (no tap-set selection needed).
  var SCREENS = [
    [0,"Home"],[1,"Contacts"],[2,"Messages"],[3,"Settings"],[8,"Display"],
    [9,"GPS settings"],[10,"Mesh settings"],[15,"Bluetooth"],[4,"GPS"],[5,"Battery"],
    [6,"Mesh"],[7,"Status"],[25,"Trail"],[29,"Team"],[35,"Waypoints"],[12,"Lock"]
  ];
  if (typeof SimT5Module !== "function") {
    var s = document.getElementById("simt5-status");
    if (s) s.textContent = "Preview unavailable (sim_t5.js failed to load).";
    return;
  }
  var canvas = document.getElementById("simt5-screen");
  var ctx = canvas.getContext("2d");
  var M, down = false;

  function draw() {
    var w = M._sim_w(), h = M._sim_h(), st = M._sim_stride(), ptr = M._sim_pixels();
    var src = M.HEAPU8.subarray(ptr, ptr + st * h);
    var img = ctx.createImageData(w, h);
    for (var y = 0; y < h; y++)
      for (var x = 0; x < w; x++) {
        var v = src[y * st + x], o = (y * w + x) * 4;
        img.data[o] = v; img.data[o+1] = v; img.data[o+2] = v; img.data[o+3] = 255;
      }
    ctx.putImageData(img, 0, 0);
  }
  function boot() {
    M._sim_boot(+document.getElementById("simt5-lang").value);
    draw();
  }
  function panelXY(e) {
    var r = canvas.getBoundingClientRect();
    return [Math.round((e.clientX - r.left) * (540 / r.width)),
            Math.round((e.clientY - r.top) * (960 / r.height))];
  }

  SimT5Module().then(function (mod) {
    M = mod;
    var sel = document.getElementById("simt5-goto");
    SCREENS.forEach(function (row) {
      var o = document.createElement("option");
      o.value = row[0]; o.textContent = row[1]; sel.appendChild(o);
    });
    document.getElementById("simt5-status").textContent = "";
    boot();
    setInterval(function () { M._sim_tick(250); draw(); }, 250);

    canvas.addEventListener("pointerdown", function (e) {
      e.preventDefault(); down = true; canvas.setPointerCapture(e.pointerId);
      var p = panelXY(e); M._sim_touch(p[0], p[1], 1); draw();
    });
    canvas.addEventListener("pointermove", function (e) {
      if (!down) return;
      var p = panelXY(e); M._sim_touch(p[0], p[1], 1); draw();
    });
    function up(e) {
      if (!down) return; down = false;
      var p = panelXY(e); M._sim_touch(p[0], p[1], 0);
      M._sim_tick(40); draw();   // let momentum/settle finish
    }
    canvas.addEventListener("pointerup", up);
    canvas.addEventListener("pointercancel", up);

    sel.addEventListener("change", function () { M._sim_goto(+sel.value); draw(); });
    document.getElementById("simt5-lang").addEventListener("change", boot);
    document.getElementById("simt5-reset").addEventListener("click", boot);
  }).catch(function (err) {
    document.getElementById("simt5-status").textContent = "Preview failed: " + err;
  });
})();
