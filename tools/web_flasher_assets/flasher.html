<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>$project_name</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"] },
            colors: {
              border: "hsl(var(--border))",
              input: "hsl(var(--input))",
              ring: "hsl(var(--ring))",
              background: "hsl(var(--background))",
              foreground: "hsl(var(--foreground))",
              primary: { DEFAULT: "hsl(var(--primary))", foreground: "hsl(var(--primary-foreground))" },
              secondary: { DEFAULT: "hsl(var(--secondary))", foreground: "hsl(var(--secondary-foreground))" },
              muted: { DEFAULT: "hsl(var(--muted))", foreground: "hsl(var(--muted-foreground))" },
              accent: { DEFAULT: "hsl(var(--accent))", foreground: "hsl(var(--accent-foreground))" },
              card: { DEFAULT: "hsl(var(--card))", foreground: "hsl(var(--card-foreground))" }
            },
            borderRadius: {
              lg: "var(--radius)",
              md: "calc(var(--radius) - 2px)",
              sm: "calc(var(--radius) - 4px)"
            }
          }
        }
      };
    </script>
    <script type="module" src="https://unpkg.com/esp-web-tools@10/dist/web/install-button.js?module"></script>
    <style>
      /* shadcn/ui "neutral" base color — light theme tokens */
      :root {
        --background: 0 0% 100%;
        --foreground: 0 0% 3.9%;
        --card: 0 0% 100%;
        --card-foreground: 0 0% 3.9%;
        --primary: 0 0% 9%;
        --primary-foreground: 0 0% 98%;
        --secondary: 0 0% 96.1%;
        --secondary-foreground: 0 0% 9%;
        --muted: 0 0% 96.1%;
        --muted-foreground: 0 0% 45.1%;
        --accent: 0 0% 96.1%;
        --accent-foreground: 0 0% 9%;
        --border: 0 0% 89.8%;
        --input: 0 0% 89.8%;
        --ring: 0 0% 3.9%;
        --radius: 0.5rem;

        --esp-tools-button-color: hsl(var(--primary));
        --esp-tools-button-text-color: hsl(var(--primary-foreground));
        --esp-tools-button-border-radius: calc(var(--radius) - 2px);
      }

      body { color-scheme: light; font-family: "Inter", ui-sans-serif, system-ui, sans-serif; }

      esp-web-install-button::part(button) {
        font-family: "Inter", ui-sans-serif, system-ui, sans-serif;
        font-weight: 500;
        font-size: 0.875rem;
        padding: 0.5rem 1rem;
        line-height: 1.5rem;
      }

      /* screen gallery — all slides stacked in one grid cell, cross-faded.
         The stage width is capped per-device so renders show roughly
         device-sized instead of stretching to the full column. */
      .gallery { display: flex; flex-direction: column; gap: 0.75rem; }
      .slideshow { display: grid; width: 100%; }
      .slideshow > .slide { grid-area: 1 / 1; width: 100%; opacity: 0; transition: opacity .6s ease; }
      .slideshow > .slide.is-active { opacity: 1; }
      .pixelated { image-rendering: pixelated; }

      /* native <progress> styled as a shadcn Progress bar */
      progress.ui-progress { -webkit-appearance: none; appearance: none; border: 0; }
      progress.ui-progress::-webkit-progress-bar { background: hsl(var(--secondary)); border-radius: 9999px; }
      progress.ui-progress::-webkit-progress-value { background: hsl(var(--primary)); border-radius: 9999px; }
      progress.ui-progress::-moz-progress-bar { background: hsl(var(--primary)); border-radius: 9999px; }

      /* WASM live-preview controls (shared by the Wio mono + T5 LVGL previews) */
      .sim canvas { background:#fff; border:1px solid hsl(var(--border)); border-radius:6px; touch-action:none; }
      .sim.sim-t5 canvas { width:240px; height:auto; cursor:pointer; }
      .sim.sim-wio canvas { image-rendering: pixelated; border-radius:4px; }
      .sim .dpad { display:grid; grid-template-columns:repeat(3,40px); grid-template-rows:repeat(3,40px); gap:4px; }
      .sim .dpad button { padding:0; font-size:15px; }
      .sim .dpad .u{grid-area:1/2} .sim .dpad .l{grid-area:2/1} .sim .dpad .e{grid-area:2/2}
      .sim .dpad .r{grid-area:2/3} .sim .dpad .d{grid-area:3/2} .sim .dpad .b{grid-area:1/3}
      .sim .ctl { display:inline-flex; align-items:center; justify-content:center; white-space:nowrap;
        border:1px solid hsl(var(--border)); border-radius:6px; padding:5px 10px; font-size:12px; font-weight:500;
        background:hsl(var(--background)); color:hsl(var(--foreground)); cursor:pointer; }
      .sim .ctl:hover { background:hsl(var(--muted)); }
      .sim select.ctl { cursor:pointer; }
    </style>
  </head>
  <body class="min-h-screen bg-background text-foreground antialiased">
    <div id="app"></div>
    <script>window.__FLASHER_PREACT__ = true; window.__FLASHER__ = $config;</script>
    <script type="module" src="app.mjs"></script>
  </body>
</html>
